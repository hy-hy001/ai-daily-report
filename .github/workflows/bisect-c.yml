name: bisect-c
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: complex step
        run: |
          UA="Mozilla/5.0"
          echo "User-Agent: $UA"
          echo "test"
      - name: commit step
        run: |
          git config user.name "Bot"
          git add -A
          git diff --cached --quiet || git commit -m "test"
