name: bisect-e
on:
  push:
    branches: [main]
  schedule:
    - cron: '3 22 * * *'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate
        run: |
          python3 -c "print('test')" > output.txt
      - name: commit
        run: |
          git config user.name "Bot"
          git config user.email "bot@test.com"
          git add output.txt
          git diff --cached --quiet || git commit -m "test"
